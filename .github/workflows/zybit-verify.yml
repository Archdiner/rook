name: Zybit verify

on:
  push:
    paths:
      - 'zybit/**'
      - '.github/workflows/zybit-verify.yml'
  pull_request:
    paths:
      - 'zybit/**'
      - '.github/workflows/zybit-verify.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zybit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: zybit/package-lock.json

      - run: npm ci

      - run: npm run verify

  migrate-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zybit_ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zybit_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zybit_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: zybit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: zybit/package-lock.json

      - run: npm ci

      - name: Apply Drizzle migrations (smoke)
        run: npx drizzle-kit migrate
